<!DOCTYPE html>
<html>
<body>
  <h1>API Demo</h1>
  <input type="text" id="nameInput" placeholder="Enter your name">
  <button onclick="callMyAPI()">Call API</button>
  
  <div id="responseBoard" style="margin-top: 20px; font-family: monospace;">
    Response will appear here...
  </div>

  <script>
    async function callMyAPI() {
      const name = document.getElementById('nameInput').value;
      const board = document.getElementById('responseBoard');
      
      board.innerText = "Loading...";

      try {
        // We use a relative path because Vercel hosts them on the same domain
        const response = await fetch(`/api/greet?name=${name}`);
        const data = await response.json();

        board.innerHTML = `
          <p><strong>Message:</strong> ${data.message}</p>
          <p><strong>Time:</strong> ${data.timestamp}</p>
        `;
      } catch (error) {
        board.innerText = "Error: " + error;
      }
    }
  </script>
</body>
</html>
